name: Deploy and Inject API Keys

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Inject API key
      env:
        GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}
      run: |
        # Read the script.js file
        sed -i "s/apiKey: '', \/\/ Add your Google AI Studio API key here/apiKey: '$GEMMA_API_KEY', \/\/ Injected from GitHub Secrets/" script.js
        
        # Verify the injection worked
        echo "API key injection completed"
        grep -n "apiKey:" script.js | head -1
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
