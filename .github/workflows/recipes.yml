name: Deploy Website

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Add API Key
      env:
        GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}
      run: |
        # Replace environment variable with actual secret value
        sed -i "s/gemma/gemma-1.1-7b-it/g" script.js
        sed -i "s/v1beta/v1/g" script.js
        sed -i "s/process.env.GEMMA_API_KEY || ''/\'$GEMMA_API_KEY\'/" script.js
        echo "✅ API key added and model updated to gemma-1.1-7b-it!"
        
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
