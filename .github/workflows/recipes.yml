name: Deploy Website

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Add API Keys
      env:
        GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      run: |
        # Replace environment variables with actual secret values
        sed -i "s/gemma/gemma-1.1-7b-it/g" script.js
        sed -i "s/v1beta/v1/g" script.js
        sed -i "s/apiKey: '', \/\/ GitHub secret/apiKey: '$GEMMA_API_KEY', \/\/ GitHub secret/g" script.js
        sed -i "s/API_KEY: '', \/\/ Will be injected/API_KEY: '$RESEND_API_KEY', \/\/ Injected/g" script.js
        echo "✅ API keys added and model updated!"
        
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
