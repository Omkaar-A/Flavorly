name: Make Recipes Work!

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Get your code
      uses: actions/checkout@v4
      
    - name: Put secret key in code
      env:
        SECRET_KEY: ${{ secrets.GEMMA_API_KEY }}
      run: |
        # Replace empty key with your secret key
        sed -i "s/apiKey: '', \/\/ Your secret key is hidden in GitHub Secrets!/apiKey: '$SECRET_KEY', \/\/ Your secret key is now loaded!/" script.js
        
        # Show it worked!
        echo "✅ Secret key added!"
        grep "apiKey:" script.js
      
    - name: Put on internet
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
