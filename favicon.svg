<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="flavorlyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCD34D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E7EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9CA3AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="16" cy="16" r="14" fill="url(#flavorlyGradient)"/>
  
  <!-- Plate -->
  <ellipse cx="16" cy="20" rx="11" ry="3" fill="url(#plateGradient)" opacity="0.3"/>
  
  <!-- Fork -->
  <rect x="8" y="8" width="1.5" height="8" fill="white" rx="0.5"/>
  <rect x="7" y="7" width="3" height="1" fill="white" rx="0.5"/>
  <rect x="7.5" y="14" width="2" height="4" fill="white" rx="1"/>
  
  <!-- Knife -->
  <rect x="22" y="8" width="1.5" height="8" fill="white" rx="0.5"/>
  <polygon points="22,7 23.5,7 23,8" fill="white"/>
  <rect x="22.5" y="14" width="1" height="4" fill="white" rx="0.5"/>
  
  <!-- Steam/wavy lines -->
  <path d="M14 4 Q15 2, 16 4 T18 4" stroke="white" stroke-width="1" fill="none" opacity="0.8"/>
  <path d="M16 5 Q17 3, 18 5 T20 5" stroke="white" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Letter F -->
  <text x="16" y="23" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="white">F</text>
  
  <!-- Sparkles -->
  <circle cx="6" cy="6" r="0.5" fill="white" opacity="0.9"/>
  <circle cx="26" cy="8" r="0.5" fill="white" opacity="0.9"/>
  <circle cx="24" cy="26" r="0.5" fill="white" opacity="0.9"/>
  <circle cx="8" cy="24" r="0.5" fill="white" opacity="0.9"/>
</svg>
