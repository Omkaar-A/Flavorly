<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCD34D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bowlGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="soupGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDE68A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bgGradient)"/>
  
  <!-- Bowl -->
  <path d="M6 14 Q6 20, 16 20 Q26 20, 26 14 Z" fill="url(#bowlGradient)" stroke="white" stroke-width="0.5"/>
  
  <!-- Soup/food in bowl -->
  <ellipse cx="16" cy="14" rx="9" ry="3" fill="url(#soupGradient)"/>
  
  <!-- Spoon -->
  <ellipse cx="24" cy="10" rx="1" ry="3" fill="white" transform="rotate(30 24 10)"/>
  <rect x="23" y="12" width="1" height="6" fill="white" transform="rotate(30 23 12)"/>
  <circle cx="25" cy="8" r="1.5" fill="white"/>
  
  <!-- Fork -->
  <rect x="7" y="10" width="1" height="6" fill="white"/>
  <rect x="6" y="9" width="3" height="1" fill="white"/>
  <rect x="6.5" y="15" width="2" height="4" fill="white" rx="1"/>
  <!-- Fork tines -->
  <rect x="6.5" y="8" width="0.3" height="2" fill="white"/>
  <rect x="7.5" y="8" width="0.3" height="2" fill="white"/>
  <rect x="8.5" y="8" width="0.3" height="2" fill="white"/>
  
  <!-- Flavor ingredients floating -->
  <circle cx="12" cy="12" r="0.8" fill="#DC2626" opacity="0.8"/> <!-- Red pepper -->
  <circle cx="20" cy="13" r="0.6" fill="#059669" opacity="0.8"/> <!-- Green herb -->
  <circle cx="15" cy="11" r="0.5" fill="#7C3AED" opacity="0.8"/> <!-- Purple spice -->
  
  <!-- Steam waves -->
  <path d="M13 6 Q14 4, 15 6 T17 6" stroke="white" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M15 5 Q16 3, 17 5 T19 5" stroke="white" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M17 6 Q18 4, 19 6 T21 6" stroke="white" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Flavor text -->
  <text x="16" y="26" font-family="Arial, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="white">FLAVOR</text>
  
  <!-- Taste buds/sparkles -->
  <circle cx="5" cy="5" r="0.4" fill="white" opacity="0.9"/>
  <circle cx="27" cy="7" r="0.4" fill="white" opacity="0.9"/>
  <circle cx="26" cy="25" r="0.4" fill="white" opacity="0.9"/>
  <circle cx="6" cy="27" r="0.4" fill="white" opacity="0.9"/>
</svg>
